general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 5              # 5 сек после блокировки — разблокировка без пароля
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 9
    brightness = 0.6
    contrast = 0.9
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgb(151515)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgb(a6e3a1)
    fail_color = rgb(f38ba8)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgb(f9e2af)
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date '+%H:%M')</b>"
    color = rgba(cdd6f4ff)
    font_size = 72
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %d %B %Y')"
    color = rgba(cdd6f4bb)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}
